spring.application.name=code-sync-server

server.port=${API_PORT:8080}
app.socket.port=${PORT:3000}
app.client-url=${CLIENT_URL:*}
app.backend-url=${BACKEND_URL:http://localhost:8080}
app.keep-alive-interval-ms=60000
app.cache.flush-interval-ms=30000

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/codesync?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:nitheesh}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:code-sync-jwt-secret-change-in-production-min-32-chars}
app.jwt.expiration-ms=86400000

spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
